<script>
function addToCart(nombre, precio, imagen){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];


let existe = carrito.find(item => item.nombre === nombre);

if(existe){
existe.cantidad += 1;
}else{
carrito.push({
nombre: nombre,
precio: precio,
imagen: imagen,
cantidad: 1
});
}

localStorage.setItem("carrito", JSON.stringify(carrito));

}
</script>
